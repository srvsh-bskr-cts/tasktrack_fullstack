<app-header></app-header>

<main class="p-8 md:p-12 bg-zinc-50 dark:bg-zinc-950 min-h-[calc(100vh-64px)] transition-colors duration-500">
  <div class="max-w-7xl mx-auto">
    
    <!-- <header class="mb-12">
      <nav class="flex items-center gap-2 text-[10px] font-black text-indigo-500 uppercase tracking-[0.3em] mb-4">
        <span>System</span>
        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M9 5l7 7-7 7"/></svg>
        <span class="text-zinc-400 dark:text-zinc-500">Administrative Root</span>
      </nav>
      <h1 class="text-4xl md:text-5xl font-black text-zinc-900 dark:text-white tracking-tighter uppercase">
        Control Panel
      </h1>
      <div class="h-[1px] w-full bg-zinc-200 dark:bg-zinc-800 mt-8"></div>
    </header> -->

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      
      <div class="group relative bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 p-8 rounded-[2.5rem] shadow-sm hover:shadow-2xl hover:shadow-indigo-500/10 hover:border-indigo-500/50 transition-all duration-300">
        <div class="w-12 h-12 rounded-2xl bg-zinc-100 dark:bg-zinc-800 flex items-center justify-center text-zinc-600 dark:text-zinc-400 mb-6 group-hover:bg-indigo-600 group-hover:text-white transition-all">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        </div>
        

        <h2 class="text-xl font-black text-zinc-900 dark:text-white uppercase tracking-tight mb-8">Manage Users</h2>
        
        <div class="space-y-2">
          <a routerLink="/admin/users" class="flex items-center justify-between p-4 rounded-2xl bg-zinc-50 dark:bg-zinc-800/50 text-zinc-600 dark:text-zinc-300 hover:bg-indigo-50 dark:hover:bg-indigo-500/10 hover:text-indigo-600 dark:hover:text-indigo-400 transition-all group/link">
            <span class="text-xs font-bold uppercase tracking-wider">View All Users</span>
            <span class="opacity-0 group-hover/link:opacity-100 transition-opacity">→</span>
          </a>
          <a routerLink="/admin/approve" class="flex items-center justify-between p-4 rounded-2xl bg-zinc-50 dark:bg-zinc-800/50 text-zinc-600 dark:text-zinc-300 hover:bg-indigo-50 dark:hover:bg-indigo-500/10 hover:text-indigo-600 dark:hover:text-indigo-400 transition-all group/link">
            <span class="text-xs font-bold uppercase tracking-wider">Approve Requests</span>
            <span class="opacity-0 group-hover/link:opacity-100 transition-opacity">→</span>
          </a>
        </div>
      </div>

      <div class="group relative bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 p-8 rounded-[2.5rem] shadow-sm hover:shadow-2xl hover:shadow-indigo-500/10 hover:border-indigo-500/50 transition-all duration-300">
        <div class="w-12 h-12 rounded-2xl bg-zinc-100 dark:bg-zinc-800 flex items-center justify-center text-zinc-600 dark:text-zinc-400 mb-6 group-hover:bg-indigo-600 group-hover:text-white transition-all">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
        </div>
        
       <h2 class="text-xl font-black text-zinc-900 dark:text-white uppercase tracking-tight mb-8">Workflows</h2>
        
        <div class="space-y-2">
          <a  routerLink="/admin/templates" class="flex items-center justify-between p-4 rounded-2xl bg-zinc-50 dark:bg-zinc-800/50 text-zinc-600 dark:text-zinc-300 hover:bg-indigo-50 dark:hover:bg-indigo-500/10 hover:text-indigo-600 dark:hover:text-indigo-400 transition-all group/link">
            <span class="text-xs font-bold uppercase tracking-wider">View All Templates</span>
            <span class="opacity-0 group-hover/link:opacity-100 transition-opacity">→</span>
          </a>
          <!-- <a href="#" class="flex items-center justify-between p-4 rounded-2xl bg-zinc-50 dark:bg-zinc-800/50 text-zinc-600 dark:text-zinc-300 hover:bg-indigo-50 dark:hover:bg-indigo-500/10 hover:text-indigo-600 dark:hover:text-indigo-400 transition-all group/link">
            <span class="text-xs font-bold uppercase tracking-wider">Create Template</span>
            <span class="opacity-0 group-hover/link:opacity-100 transition-opacity">→</span>
          </a> -->

          
          <button (click)="handleCreateNewDialogOpen()" class="flex items-center justify-between w-full p-4 rounded-2xl bg-zinc-50 dark:bg-zinc-800/50 text-zinc-600 dark:text-zinc-300 hover:bg-indigo-50 dark:hover:bg-indigo-500/10 hover:text-indigo-600 dark:hover:text-indigo-400 transition-all group/link">
  
    <span class="truncate text-xs font-bold uppercase tracking-wider" > Create New Template</span>
  </button>
        </div>
      </div>

      <div class="group relative bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 p-8 rounded-[2.5rem] shadow-sm hover:shadow-2xl hover:shadow-indigo-500/10 hover:border-indigo-500/50 transition-all duration-300">
        <div class="w-12 h-12 rounded-2xl bg-zinc-100 dark:bg-zinc-800 flex items-center justify-center text-zinc-600 dark:text-zinc-400 mb-6 group-hover:bg-indigo-600 group-hover:text-white transition-all">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        </div>
        
        <h2 class="text-xl font-black text-zinc-900 dark:text-white uppercase tracking-tight mb-8">Reports</h2>
        
        <div class="space-y-2">
          <a routerLink="/admin/reports/generate" class="flex items-center justify-between p-4 rounded-2xl bg-zinc-50 dark:bg-zinc-800/50 text-zinc-600 dark:text-zinc-300 hover:bg-indigo-50 dark:hover:bg-indigo-500/10 hover:text-indigo-600 dark:hover:text-indigo-400 transition-all group/link">
            <span class="text-xs font-bold uppercase tracking-wider">Generate Reports</span>
            <span class="opacity-0 group-hover/link:opacity-100 transition-opacity">→</span>
          </a>
          <a routerLink="/admin/reports/all" class="flex items-center justify-between p-4 rounded-2xl bg-zinc-50 dark:bg-zinc-800/50 text-zinc-600 dark:text-zinc-300 hover:bg-indigo-50 dark:hover:bg-indigo-500/10 hover:text-indigo-600 dark:hover:text-indigo-400 transition-all group/link">
            <span class="text-xs font-bold uppercase tracking-wider">View Archive</span>
            <span class="opacity-0 group-hover/link:opacity-100 transition-opacity">→</span>
          </a>
        </div>
      </div>

    </div>

    <div class="mt-12">
      <router-outlet></router-outlet>
    </div>
  </div>
</main>

@if(createNewDialogOpen) {
  
  <app-new-workflow-template   [(isOpen)]="createNewDialogOpen" (cancel)="handleCreateNewDialogOpen()">

  </app-new-workflow-template>
}
